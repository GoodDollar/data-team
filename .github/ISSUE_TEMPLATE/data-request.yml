name: Data Request
description: Ask for analysis, a query, a dashboard, or any data deliverable
title: "[Data Request] "
labels: ["data-request"]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "Low -- nice to have"
        - "Medium -- needed soon"
        - "High -- blocking work"
      default: 1
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: What do you want to know and why?
      description: The question you're trying to answer and what decision it informs.
      placeholder: "e.g. How many unique wallets claimed UBI weekly in 2025? Need it for the investor deck."
    validations:
      required: true

  - type: textarea
    id: deliverable
    attributes:
      label: What should the output look like?
      description: "Format, audience, and frequency."
      placeholder: |
        Examples:
        - A live Dune dashboard, public, refreshes daily.
        - A one-time CSV export for the governance call.
        - A chart I can screenshot for the campaign page.
        - A number I can drop into a Slack post every week.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Data hints, references, and extra context
      description: "Anything that helps me find the data and understand how to process it: chains, contracts, events, time ranges, existing dashboards, calculations, filters, groupings, screenshots, related past work."
      placeholder: |
        e.g. On-chain Celo, claim events, Jan-Mar 2025. Exclude known bot wallets.
        Group by week, compare to previous period.
        Or: no idea where the data lives, just know it's blockchain data.
