name: publish site

# Rebuilds and deploys all tools/docs to GitHub Pages:
#   - dbt docs  → /onchain-analytics/  (gooddollar.github.io/data-team/onchain-analytics/)
#   - UTM builder → /utm-builder/      (gooddollar.github.io/data-team/utm-builder/)
#
# Runs on pushes to master that touch either the dbt project or the UTM builder,
# and on manual dispatch. The dbt docs build uses --empty-catalog so NO BigQuery
# credentials are needed — lineage, descriptions, and compiled SQL come from code.

on:
  push:
    branches: [master]
    paths:
      - 'projects/onchain-analytics/gd_dbt/**'
      - 'tools/utm-builder/**'
      - '.github/workflows/dbt-docs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dbt-docs
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-current

      - uses: actions/checkout@v4
        with:
          path: source

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install "dbt-bigquery==1.9.*"

      - name: Minimal profile (docs build needs no warehouse connection)
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<'YAML'
          gd_dbt:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: oauth
                project: gooddollar
                dataset: dev_sandbox
                threads: 4
          YAML

      - name: Build static docs
        working-directory: source/projects/onchain-analytics/gd_dbt
        run: |
          dbt deps
          dbt parse
          dbt docs generate --static --empty-catalog --no-compile

      - name: Publish to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tmp="$(mktemp -d)"
          # Preserve existing gh-pages content (other tools like utm-builder)
          if [ -d gh-pages-current ]; then
            cp -r gh-pages-current/* "$tmp/" 2>/dev/null || true
            rm -rf "$tmp/.git"
          fi
          # Deploy dbt docs into /onchain-analytics/ subfolder
          mkdir -p "$tmp/onchain-analytics"
          cp source/projects/onchain-analytics/gd_dbt/target/static_index.html "$tmp/onchain-analytics/index.html"
          # Deploy UTM builder tool into /utm-builder/ subfolder
          mkdir -p "$tmp/utm-builder"
          cp source/tools/utm-builder/index.html "$tmp/utm-builder/index.html"
          cp source/tools/utm-builder/config.json "$tmp/utm-builder/config.json"
          touch "$tmp/.nojekyll"
          git -C "$tmp" init -q -b gh-pages
          git -C "$tmp" config user.name "github-actions[bot]"
          git -C "$tmp" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$tmp" add .
          git -C "$tmp" commit -q -m "docs: publish site [skip ci]"
          git -C "$tmp" push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
