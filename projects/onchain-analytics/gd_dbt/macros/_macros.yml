version: 2

macros:
  - name: generate_schema_name
    description: >
      Routes models to the correct BigQuery dataset based on the deployment target.


      **In production** (`dbt run --target prod`): each model goes to the dataset defined by its
      `+schema` config — Staging, Semantic, or Marts. This is how the live warehouse is organized.


      **In development** (`dbt run --target dev`): all models go to the `dev_sandbox` dataset
      regardless of their schema config. This keeps experiments isolated from production.
    arguments:
      - name: custom_schema_name
        type: string
        description: >
          The schema name defined in `dbt_project.yml` for this model's layer
          (e.g., 'Staging', 'Semantic', 'Marts'). Passed automatically by dbt.
      - name: node
        type: object
        description: >
          The dbt node object for the model being built. Contains model metadata.
          Passed automatically by dbt.

  - name: latest_closed_date
    description: >
      Returns the latest complete business date available to analytics: yesterday in UTC.
      Business-facing dbt models must exclude the current partial day unless a model is
      explicitly documented as partial/intraday.

  - name: latest_closed_as_of_timestamp
    description: >
      Returns the timestamp boundary for closed-day analytics: midnight UTC at the start
      of the current day. Use this for as-of calculations, such as eligibility windows,
      so results are consistent with the latest_closed_date contract.
