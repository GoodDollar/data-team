name: 'gd_dbt'
version: '1.0.0'
config-version: 2

# This tells dbt which connection profile to use (must match the name in ~/.dbt/profiles.yml)
profile: 'gd_dbt'

# Paths (relative to this file)
model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

# These folders are generated by dbt at run time — never commit them
clean-targets:
  - "target"
  - "dbt_packages"

# Default materialization per layer.
# "view" = BigQuery view (no data stored, always fresh)
# "table" = BigQuery table (data is stored, must be rebuilt to update)
models:
  gd_dbt:
    staging:
      +materialized: view
      +schema: Staging
      +tags: ['staging']
    semantic:
      +materialized: view
      +schema: Semantic
      +tags: ['semantic']
    marts:
      +materialized: table
      +schema: Marts
      +tags: ['mart']
